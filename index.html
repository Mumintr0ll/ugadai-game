<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Игра Угадай слово</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game-container">
    <h2>Игра «Угадай слово»</h2>

    <p id="word"></p>

    <p>Очки: <span id="score">10</span></p>

    <button onclick="checkLetter()">Проверить</button>

    <p id="message"></p>
</div>

<script src="script.js"></script>

</body>
</html>
